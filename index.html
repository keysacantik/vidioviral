<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Viral</title>
    <style>
        /* Mengatur dasar halaman agar berwarna hitam pekat */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        /* Kotak Putih Utama dengan Efek Neon Pink */
        .card-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 1.5rem;
            padding: 2rem 1.5rem;
            text-align: center;
            /* Efek pendaran neon merah muda di sekeliling kotak */
            box-shadow: 0 0 40px 10px rgba(236, 72, 153, 0.6); 
        }

        /* Bagian Judul "VIDEO VIRAL" */
        .title-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
        }
        /* Mengatur ukuran emoji api */
        .title-box span {
            font-size: 1.4rem;
        }

        /* Gaya Tombol Utama (Hitam dengan Bingkai Emas) */
        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 1.1rem;
            border-radius: 0.75rem;
            margin-bottom: 1.25rem;
            /* Bingkai ganda berwarna kuning/emas tipis */
            border: 2px solid #eab308;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s ease, background-color 0.2s ease;
        }
        /* Efek interaktif kecil saat tombol ditekan */
        .btn-link:hover {
            background-color: #111827;
        }
        .btn-link:active {
            transform: scale(0.98);
        }

        /* Menghilangkan margin bawah pada tombol terakhir */
        .btn-link:last-child {
            margin-bottom: 0;
        }

        /* Gaya Khusus untuk Simbol Play (Segitiga Putih) */
        .play-icon {
            font-size: 0.85rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <!-- Kotak Utama Halaman -->
    <div class="card-container">
        
        <!-- Judul Atas dengan Emoji Api -->
        <div class="title-box">
            <span>🔥</span> VIDEO VIRAL <span>🔥</span>
        </div>

        <!-- Tombol 1: Watch Video -->
        <a href="https://summarywatch.blogspot.com/?id=Rix9FHDi1" class="btn-link">
            <span class="play-icon">▶</span> Watch Video
        </a>

        <!-- Tombol 2: Play Video -->
        <a href="https://t.co/X0oIS3gSXa" class="btn-link">
            <span class="play-icon">▶</span> Play Video
        </a>

        <!-- Tombol 3: Alternative Link -->
        <a href="https://t.co/z5S0kEXKRy" class="btn-link">
            <span class="play-icon">▶</span> Alternative Link
        </a>

    </div>

</body>
</html>
